<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinnara Market - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #050505; /* Midnight Black */
            --card-bg: rgba(255, 255, 255, 0.05);
            --nav-bg: rgba(15, 15, 15, 0.85);
            --accent-white: #ffffff;
            --muted-text: #909090;
            --blue-ios: #007aff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            /* နှိပ်လိုက်ရင် အဖြူရောင်အကွက်ပေါ်တာ ဖျောက်ထားသည် */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.08) 0%, transparent 60%);
            color: var(--accent-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header --- */
        .header {
            display: flex;
            align-items: center;
            padding: 25px;
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.2);
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            margin-right: 15px;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255,255,255,0.4);
        }

        /* --- Sections Layout --- */
        .content-section {
            display: none;
            padding: 20px;
            padding-bottom: 130px;
            animation: fadeIn 0.5s ease-out;
        }

        .content-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 2. Information Section --- */
        .info-item {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            padding: 22px;
            border-radius: 20px;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
        }

        .info-item:active { transform: scale(0.97); }

        .info-item i {
            font-size: 28px;
            margin-right: 20px;
            text-shadow: 0 0 15px white;
        }

        .info-item span { font-size: 16px; font-weight: 500; }

        /* --- 3. ဝယ်ယူရန် Section --- */
        .pay-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: 0.2s;
        }

        .pay-card:active { transform: scale(0.98); background: rgba(255,255,255,0.08); }

        .pay-left { display: flex; align-items: center; }

        .pay-logo-mini {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            margin-right: 15px;
            object-fit: contain;
        }

        .pay-details { display: flex; flex-direction: column; }
        .pay-num { font-weight: 600; font-size: 15px; }
        .pay-name { font-size: 11px; color: var(--muted-text); }

        .copy-text { font-size: 10px; color: var(--muted-text); text-transform: uppercase; letter-spacing: 1px; }

        /* --- 4. ပြေစာတင်ခြင်း --- */
        .upload-wrapper { margin-top: 30px; }

        .receipt-box {
            width: 100%;
            height: 180px;
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            transition: 0.3s;
        }

        .receipt-box i { font-size: 40px; margin-bottom: 10px; }
        .receipt-box span { font-size: 14px; font-weight: 500; }

        #img-preview {
            width: 100%;
            border-radius: 20px;
            margin-top: 20px;
            display: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .send-button {
            width: 100%;
            background: var(--blue-ios);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            display: none; /* ပုံတင်မှ ပေါ်မည် */
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.3);
            cursor: pointer;
        }

        /* --- Bottom Nav (iPhone Style) --- */
        .bottom-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            height: 70px;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 70px;
            cursor: pointer;
            position: relative;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-item i {
            font-size: 22px;
            color: #555;
            transition: 0.4s;
        }

        .nav-item span {
            font-size: 10px;
            color: #555;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.4s;
            margin-top: 4px;
        }

        /* Active State - Lifts Up */
        .nav-item.active i {
            transform: translateY(-14px);
            color: var(--accent-white);
            text-shadow: 0 0 15px white;
        }

        .nav-item.active span {
            opacity: 1;
            transform: translateY(2px);
            color: var(--accent-white);
        }

        /* iPhone Line Indicator */
        .indicator {
            position: absolute;
            bottom: 8px;
            width: 25px;
            height: 3px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px white;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="https://i.ibb.co/XvPdKky/IMG-20260329-012454-453.jpg" class="logo">
        <h1 class="title">Kinnara</h1>
    </header>

    <main id="home-tab" class="content-section active">
        <div style="text-align: center; margin-top: 100px; color: var(--muted-text);">
            Welcome to Kinnara Space
        </div>
    </main>

    <main id="buy-tab" class="content-section">
        
        <div class="pay-card" onclick="copyValue('09788319436', this)">
            <div class="pay-left">
                <img src="https://i.ibb.co/0pB9vcGt/IMG-20260329-154219.png" class="pay-logo-mini">
                <div class="pay-details">
                    <span class="pay-num">09788319436</span>
                    <span class="pay-name">Name - Daw Yin Kyi</span>
                </div>
            </div>
            <span class="copy-text">[ Tap To Copy ]</span>
        </div>

        <div class="pay-card" onclick="copyValue('09788319436', this)">
            <div class="pay-left">
                <img src="https://i.ibb.co/JgDdff5/unnamed-4.png" class="pay-logo-mini">
                <div class="pay-details">
                    <span class="pay-num">09788319436</span>
                    <span class="pay-name">Name - Yin Kyi</span>
                </div>
            </div>
            <span class="copy-text">[ Tap To Copy ]</span>
        </div>

        <div class="pay-card" onclick="copyValue('09788319436', this)">
            <div class="pay-left">
                <img src="https://i.ibb.co/ch1JyW8X/IMG-20260329-154150.png" class="pay-logo-mini">
                <div class="pay-details">
                    <span class="pay-num">09788319436</span>
                    <span class="pay-name">Name - Myat Myat Moe</span>
                </div>
            </div>
            <span class="copy-text">[ Tap To Copy ]</span>
        </div>

        <div class="upload-wrapper">
            <input type="file" id="receipt-upload" style="display: none;" accept="image/*">
            <div class="receipt-box" onclick="document.getElementById('receipt-upload').click()">
                <i class="fa-solid fa-receipt"></i>
                <span>ပြေစာပို့ရန်</span>
            </div>
            <img id="img-preview" alt="Preview">
            <button class="send-button" id="send-btn" onclick="sendToTelegram()">ပို့ရန်</button>
        </div>
    </main>

    <main id="info-tab" class="content-section">
        <a href="https://t.me/LaPa_PaBu" target="_blank" class="info-item">
            <i class="fa-solid fa-user-circle"></i>
            <span>Owner - @LaPa_PaBu</span>
        </a>
        <a href="https://t.me/KixxZGame_Store" target="_blank" class="info-item">
            <i class="fa-solid fa-shop"></i>
            <span>Channel - @KixxZGame_Store</span>
        </a>
        <a href="https://t.me/KinnaraMarket_bot" target="_blank" class="info-item">
            <i class="fa-solid fa-robot"></i>
            <span>Official Bot - @KinnaraMarket_bot</span>
        </a>
    </main>

    <nav class="bottom-nav">
        <div class="indicator" id="indicator"></div>
        
        <div class="nav-item active" onclick="switchTab('home-tab', this)">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </div>
        
        <div class="nav-item" onclick="switchTab('buy-tab', this)">
            <i class="fa-solid fa-cart-shopping"></i>
            <span>ဝယ်ယူရန်</span>
        </div>
        
        <div class="nav-item" onclick="switchTab('info-tab', this)">
            <i class="fa-solid fa-info-circle"></i>
            <span>Information</span>
        </div>
    </nav>

    <script>
        // --- Tab Switching Logic ---
        const indicator = document.getElementById('indicator');
        const sections = document.querySelectorAll('.content-section');
        const navItems = document.querySelectorAll('.nav-item');

        function updateIndicator(el) {
            const rect = el.getBoundingClientRect();
            const navRect = document.querySelector('.bottom-nav').getBoundingClientRect();
            const left = rect.left - navRect.left + (rect.width / 2) - 12.5;
            indicator.style.left = left + 'px';
        }

        function switchTab(tabId, el) {
            sections.forEach(s => s.classList.remove('active'));
            navItems.forEach(i => i.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            updateIndicator(el);
        }

        // --- Copy to Clipboard ---
        function copyValue(val, el) {
            navigator.clipboard.writeText(val);
            const hint = el.querySelector('.copy-text');
            hint.innerText = "Copied! ✔";
            hint.style.color = "white";
            setTimeout(() => { 
                hint.innerText = "[ Tap To Copy ]"; 
                hint.style.color = "#909090";
            }, 2000);
        }

        // --- Image Preview ---
        const fileInput = document.getElementById('receipt-upload');
        const preview = document.getElementById('img-preview');
        const sendBtn = document.getElementById('send-btn');

        fileInput.onchange = function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                    document.querySelector('.receipt-box').style.display = 'none';
                    sendBtn.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        // --- BACKGROUND SENDING TO TELEGRAM BOT ---
        async function sendToTelegram() {
            // [အရေးကြီး] အကို့ရဲ့ အချက်အလက်များကို ဒီမှာထည့်ပါ
           const BOT_TOKEN = '8666396262:AAE9E39Td3mLkQTD7EvbDPGPrynAiFJIfsY'; 
           const CHAT_ID = '8666396262';

            if (!fileInput.files[0]) return;

            sendBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ပို့နေပါသည်...';
            sendBtn.disabled = true;

            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', fileInput.files[0]);
            formData.append('caption', '🧾 Kinnara Market: ငွေလွှဲပြေစာ အသစ်ရောက်ရှိပါသည်။');

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    sendBtn.innerHTML = '<i class="fa-solid fa-check"></i> ပို့ပြီးပါပြီ';
                    sendBtn.style.background = '#28a745';
                    
                    setTimeout(() => {
                        preview.style.display = 'none';
                        document.querySelector('.receipt-box').style.display = 'flex';
                        sendBtn.style.display = 'none';
                        sendBtn.innerHTML = 'ပို့ရန်';
                        sendBtn.style.background = 'var(--blue-ios)';
                        sendBtn.disabled = false;
                        fileInput.value = '';
                    }, 3000);
                } else {
                    alert("Error: Token သို့မဟုတ် Chat ID မှားယွင်းနေပါသည်။");
                    sendBtn.disabled = false;
                    sendBtn.innerHTML = 'ပို့ရန်';
                }
            } catch (err) {
                alert("အင်တာနက်ချိတ်ဆက်မှုကို စစ်ဆေးပါ။");
                sendBtn.disabled = false;
                sendBtn.innerHTML = 'ပို့ရန်';
            }
        }

        window.onload = () => updateIndicator(document.querySelector('.nav-item.active'));
    </script>
</body>
</html>
