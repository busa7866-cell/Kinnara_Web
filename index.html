<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinnara - Clean UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #08080a;
            --nav-bg: rgba(20, 20, 25, 0.9);
            --neon-white: #ffffff;
            --text-muted: #666670;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
            color: white;
            margin: 0;
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            margin-right: 15px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        .title {
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* Clean Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            height: 65px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            color: var(--text-muted);
        }

        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; }

        /* Active State (Neon Glow Only) */
        .nav-item.active {
            color: var(--neon-white);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="https://i.ibb.co/XvPdKky/IMG-20260329-012454-453.jpg" class="logo">
        <h1 class="title">Kinnara</h1>
    </header>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="changeTab(this)">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="changeTab(this)">
            <i class="fa-solid fa-cart-shopping"></i>
            <span>ဝယ်ယူရန်</span>
        </div>
        <div class="nav-item" onclick="changeTab(this)">
            <i class="fa-solid fa-circle-info"></i>
            <span>Information</span>
        </div>
    </nav>

    <script>
        function changeTab(element) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
